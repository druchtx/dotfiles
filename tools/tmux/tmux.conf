# ------------------------------ #
# BEHAVIOR
# ------------------------------ #

# Keep the status line at the top.
set -g status-position top

# Use Ctrl-Space as the leader key.
unbind C-b
set -g prefix C-Space

# Start window and pane numbering at 1.
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Keep names stable unless explicitly changed.
set -g allow-rename off

# Enable mouse support and a snappier terminal UX.
set -g mouse on
set -g escape-time 10
set -g focus-events on

# ------------------------------ #
# UI
# ------------------------------ #

# Status line layout.
set -g status-style "bg=default"
set -g window-status-separator ""
set -g @status_line_left "#[align=left]#[range=session|#{session_id}]#{?client_prefix,#[fg=#0d1117]#[bg=#79c0ff],#[fg=#c9d1d9]#[bg=#30363d]}#[bold] #S:#{window_panes} #[norange]#[default]"
set -g @status_line_center "#[align=centre]#[fg=#6f7781]#[bg=default] - #[fg=#8da1b9]#[bold]#W#[nobold]#[fg=#6f7781] - #[default]"
set -g @status_line_right "#[align=right]#{W:#[range=window|#{window_index}]#[fg=#6f7781]#[bg=default] #{window_index} #[norange]#[default] ,#[range=window|#{window_index}]#[fg=#0d1117]#[bg=#d4a574]#[bold] #{window_index} #[norange]#[default] }"
set -g status-format[0] "#{E:@status_line_left}#{E:@status_line_center}#{E:@status_line_right}"

# Pane borders.
set -g pane-active-border-style "fg=#79c0ff"
set -g pane-border-style "fg=#0d1117"

# ------------------------------ #
# NAVIGATION
# ------------------------------ #

# Quick reload config.
bind r source-file ~/.tmux.conf \; display-popup -E -w 50 -h 7 "~/.dotfiles/tools/tmux/popup-message 'tmux config reloaded' 0.6"

# Quick launch nvim in the current pane.
bind v run-shell "~/.dotfiles/tools/tmux/launch-editor '#{pane_id}' '#{pane_current_command}'"

# Split panes using - and |.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Use vi keys in copy mode.
set -g mode-keys vi
bind [ copy-mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Block selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

# Resize panes with vim-like keys.
bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Use capital letters for fine-grained resizing.
bind -r H resize-pane -L 1
bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r L resize-pane -R 1

# ------------------------------ #
# PERSISTENCE
# ------------------------------ #

# Save the session before detaching.
unbind d
bind d run-shell "~/.tmux/plugins/tmux-resurrect/scripts/save.sh" \; detach-client

# Restore tmux sessions automatically at startup.
set -g @continuum-restore 'on'
set -g @resurrect-hook-post-save-layout '$HOME/.dotfiles/tools/tmux/filter-resurrect-session T'

# ------------------------------ #
# PLUGINS
# ------------------------------ #

# TPM and plugin list.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Auto-install TPM if it is missing.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM. Keep this at the very bottom.
# <leader> + I   : Install
# <leader> + A-u : Remove
# <leader> + U   : Update
run '~/.tmux/plugins/tpm/tpm'
